{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="card max-w-md w-full" style="padding: 2.5rem; border-top: 4px solid var(--warning);">
        <div class="text-center mb-8">
            <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Verify Recovery Request</h1>
            <p class="text-muted">An actively bonded recovery code has been dispatched to your email address. It
                gracefully expires mathematically exactly in 10 minutes.</p>
        </div>

        {% if error %}
        <div
            style="background: rgba(218, 54, 51, 0.1); border-left: 4px solid var(--danger); padding: 1rem; margin-bottom: 1.5rem; color: var(--danger);">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/forgot-password/verify" class="flex flex-col gap-5">
            <div class="form-group">
                <label class="form-label text-muted">Verification Code</label>
                <input name="otp" type="text" pattern="[0-9]{6}" maxlength="6" placeholder="------" required
                    class="form-input"
                    style="font-size: 1.5rem; letter-spacing: 0.5rem; text-align: center; font-family: monospace; border: 1px solid var(--warning);">
            </div>

            <button type="submit" class="btn w-full"
                style="padding: 0.8rem; font-size: 1.1rem; font-weight: 600; background: var(--warning); color: #000;">
                Unlock Reset Portal
            </button>
        </form>

        <div class="text-center mt-6">
            <a href="/login" class="text-muted text-sm hover:text-primary transition">Return to safety</a>
        </div>
    </div>
</div>
{% endblock %}
