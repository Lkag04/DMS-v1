{% extends "base.html" %}

{% block content %}

<h1 class="mb-6"> Trips - Truck {{ truck.vehicle_number }}</h1>

<div class="card max-w-md">
  <div class="table-container">
    <table class="table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Route</th>
          <th>Freight</th>
        </tr>
      </thead>
      <tbody>
        {% for trip in trips %}
        <tr>
          <td>#{{ trip.id }}</td>
          <td>{{ trip.origin }} → {{ trip.destination }}</td>
          <td style="font-weight: bold; color: var(--primary);">₹{{ trip.freight_amount }}</td>
        </tr>
        {% else %}
        <tr>
          <td colspan="3" class="text-center text-muted py-4">No trips found.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

{% endblock %}
