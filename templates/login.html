{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-screen">
    <div class="card max-w-md">
        <h2 class="text-center mb-6">Login to Diesel ERP</h2>

        {% if error %}
        <div class="card bg-danger mb-4"
            style="background: rgba(218, 54, 51, 0.2); border-color: rgba(218, 54, 51, 0.4); padding: 1rem;">
            {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div class="card bg-success mb-4"
            style="background: rgba(35, 134, 54, 0.2); border: 1px solid var(--success); color: #fff; padding: 1rem;">
            {{ success }}
        </div>
        {% endif %}

        <form method="post" action="/login">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" required class="form-input" placeholder="Enter your username">
            </div>

            <div class="form-group mb-6">
                <label class="form-label">Password</label>
                <input type="password" name="password" required class="form-input" placeholder="Enter your password">
            </div>

            <button type="submit" class="btn btn-primary w-full">
                Login
            </button>

            <div class="text-center mt-4">
                <a href="/forgot-password" style="color: var(--primary); font-size: 0.9rem;"
                    class="hover:text-primary transition">Forgot Password?</a>
            </div>
        </form>

        <div class="text-center text-muted mt-4 text-sm">
            Default Admin: admin / admin123
        </div>
    </div>
</div>
{% endblock %}
