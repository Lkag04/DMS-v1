<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="view-transition" content="same-origin" />
  <title>Diesel ERP</title>

  <!-- Custom Premium CSS -->
  <link href="/static/css/style.css" rel="stylesheet">
</head>

<body>

  <!-- ============================= -->
  <!-- NAVBAR -->
  <!-- ============================= -->
  <nav class="navbar">
    <div class="nav-links">
      <a href="/" class="nav-brand">Diesel ERP</a>
      <a href="/">Dashboard</a>
      <a href="/transporters">Transporters</a>
      <a href="/trips">Trips</a>
      <a href="/tokens/redeem">Redeem</a>
      <a href="/reports">Reports</a>
    </div>

    <!-- Right Side -->
    <div class="flex items-center gap-4">
      <!-- Theme Toggle -->
      <button id="theme-toggle" class="btn btn-secondary"
        style="border-radius: 50%; padding: 0.5rem; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;"
        title="Toggle Light/Dark Theme">
        <span id="theme-icon"></span>
      </button>

      {% if user %}
      <span class="text-muted">
        {{ user.username }} ({{ user.role }})
      </span>
      <a href="/logout" class="btn btn-danger">
        Logout
      </a>
      {% else %}
      <a href="/login" class="btn btn-primary">
        Login
      </a>
      {% endif %}
    </div>
  </nav>

  <!-- ============================= -->
  <!-- MAIN CONTENT -->
  <!-- ============================= -->
  <main class="container page-transition">
    {% block content %}{% endblock %}
  </main>

  <script>
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    const html = document.documentElement;

    // Load saved theme
    const savedTheme = localStorage.getItem('theme') || 'dark';
    if (savedTheme === 'light') {
      html.setAttribute('data-theme', 'light');
      themeIcon.textContent = '';
    }

    themeToggle.addEventListener('click', () => {
      if (html.getAttribute('data-theme') === 'light') {
        html.removeAttribute('data-theme');
        localStorage.setItem('theme', 'dark');
        themeIcon.textContent = '';
      } else {
        html.setAttribute('data-theme', 'light');
        localStorage.setItem('theme', 'light');
        themeIcon.textContent = '';
      }
    });
  </script>
</body>

</html>
