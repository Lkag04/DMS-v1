<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diesel ERP</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-gray-100">

    <!-- ============================= -->
    <!-- NAVBAR -->
    <!-- ============================= -->

    <nav class="bg-gray-800 p-4 text-white flex justify-between items-center">

        <div class="flex gap-6">

            <a href="/" class="font-bold text-lg">Diesel ERP</a>

            <a href="/" class="hover:text-gray-300">Dashboard</a>

            <a href="/transporters" class="hover:text-gray-300">Transporters</a>

            <a href="/trips" class="hover:text-gray-300">Trips</a>

            <a href="/tokens/redeem" class="hover:text-gray-300">Redeem</a>

            <a href="/reports" class="hover:text-gray-300">Reports</a>

        </div>

        <!-- Right Side -->
        <div class="flex gap-4 items-center">

            {% if user %}

                <span class="text-sm">
                    {{ user.username }} ({{ user.role }})
                </span>

                <a href="/logout" class="bg-red-500 px-3 py-1 rounded hover:bg-red-600">
                    Logout
                </a>

            {% else %}

                <a href="/login" class="bg-blue-500 px-3 py-1 rounded hover:bg-blue-600">
                    Login
                </a>

            {% endif %}

        </div>

    </nav>

    <!-- ============================= -->
    <!-- MAIN CONTENT -->
    <!-- ============================= -->

    <div class="p-6">

        {% block content %}{% endblock %}

    </div>

</body>
</html>
