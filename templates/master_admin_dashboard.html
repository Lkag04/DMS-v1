{% extends "base.html" %}

{% block content %}

<div class="flex items-center justify-between mb-6">
  <div>
    <h1>Master Admin Dashboard</h1>
    <span class="text-muted">Welcome, <strong style="color: var(--primary);">{{ user.username }}</strong></span>
  </div>
</div>

<div class="grid grid-cols-4 mb-8">
  <div class="card text-center text-muted">
    <h3 class="text-sm uppercase mb-2">Transporters</h3>
    <p style="font-size: 2.5rem; font-weight: 700; color: #fff;">{{ transporters }}</p>
  </div>
  <div class="card text-center" style="border-top: 3px solid var(--warning);">
    <h3 class="text-sm uppercase mb-2 text-warning">Pending Freight</h3>
    <p class="text-warning" style="font-size: 2.5rem; font-weight: 700;">₹{{ pending }}</p>
  </div>
  <div class="card text-center" style="border-top: 3px solid var(--success);">
    <h3 class="text-sm uppercase mb-2 text-success">Diesel Issued</h3>
    <p class="text-success" style="font-size: 2.5rem; font-weight: 700;">₹{{ diesel }}</p>
  </div>
  <div class="card text-center" style="border-top: 3px solid #bc8cff;">
    <h3 class="text-sm uppercase mb-2" style="color: #bc8cff;">Total Trips</h3>
    <p style="color: #bc8cff; font-size: 2.5rem; font-weight: 700;">{{ trips }}</p>
  </div>
</div>

<div class="card">
  <h2 class="mb-4">Quick Factory Actions</h2>
  <div class="flex flex-wrap gap-4">
    <a href="/transporters" class="btn btn-primary">Manage Transporters</a>
    <a href="/trips" class="btn btn-success">Add / View Trips</a>
  </div>
</div>

{% endblock %}
