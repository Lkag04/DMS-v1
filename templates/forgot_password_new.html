{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="card max-w-md w-full" style="padding: 2.5rem; border-top: 4px solid var(--success);">
        <div class="text-center mb-8">
            <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Create New Password</h1>
            <p class="text-muted">You have successfully proven strict account ownership. Please securely assign a strong
                new password down below to instantly unlock standard access.</p>
        </div>

        {% if error %}
        <div
            style="background: rgba(218, 54, 51, 0.1); border-left: 4px solid var(--danger); padding: 1rem; margin-bottom: 1.5rem; color: var(--danger);">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/forgot-password/new" class="flex flex-col gap-5">
            <div class="form-group">
                <label class="form-label text-muted">Strict New Password</label>
                <input name="new_password" type="password" placeholder="••••••••" required class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label text-muted">Aesthetic Confirmation</label>
                <input name="confirm_password" type="password" placeholder="••••••••" required class="form-input">
            </div>

            <button type="submit" class="btn btn-success w-full"
                style="padding: 0.8rem; font-size: 1.1rem; font-weight: 600;">
                Save Password & Return to Login
            </button>
        </form>
    </div>
</div>
{% endblock %}
