{% extends "base.html" %}

{% block content %}

<h1 class="text-2xl font-bold mb-6">Redeem Diesel Token</h1>

<!-- ============================= -->
<!-- SUCCESS / ERROR MESSAGE -->
<!-- ============================= -->

{% if message %}
<div class="bg-green-100 text-green-800 p-4 rounded mb-6 max-w-xl">
    {{ message }}
</div>
{% endif %}

{% if error %}
<div class="bg-red-100 text-red-800 p-4 rounded mb-6 max-w-xl">
    {{ error }}
</div>
{% endif %}


<!-- ============================= -->
<!-- QR SCANNER -->
<!-- ============================= -->

<div class="bg-white p-6 rounded shadow max-w-xl mb-6">

    <h2 class="text-lg font-semibold mb-4">Scan QR Code</h2>

    <div id="reader" style="width:300px;"></div>

</div>


<!-- ============================= -->
<!-- MANUAL ENTRY (Fallback) -->
<!-- ============================= -->

<div class="bg-white p-6 rounded shadow max-w-xl">

    <h2 class="text-lg font-semibold mb-4">Manual Token Entry</h2>

    <form method="post" action="/tokens/redeem" class="space-y-4">

        <input 
            id="token_input"
            name="token_uuid"
            placeholder="Enter Token ID"
            required
            class="w-full border p-2 rounded"
        >

        <button 
            type="submit"
            class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600"
        >
            Redeem Diesel
        </button>

    </form>

</div>


<!-- ============================= -->
<!-- QR SCANNER SCRIPT -->
<!-- ============================= -->

<script src="https://unpkg.com/html5-qrcode"></script>

<script>

function onScanSuccess(decodedText, decodedResult) {
    
    // Auto-fill token field
    document.getElementById("token_input").value = decodedText;

    // Stop scanner after scan
    html5QrcodeScanner.clear();
}

function onScanError(errorMessage) {
    // Ignore errors
}

let html5QrcodeScanner = new Html5QrcodeScanner(
    "reader",
    { fps: 10, qrbox: 250 }
);

html5QrcodeScanner.render(onScanSuccess, onScanError);

</script>

{% endblock %}
