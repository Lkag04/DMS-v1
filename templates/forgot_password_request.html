{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="card max-w-md w-full" style="padding: 2.5rem; border-top: 4px solid var(--primary);">
        <div class="text-center mb-8">
            <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Reset Credentials</h1>
            <p class="text-muted">Enter your exact username down below. We will deploy a 6-digit recovery code to your
                bonded email address.</p>
        </div>

        {% if error %}
        <div
            style="background: rgba(218, 54, 51, 0.1); border-left: 4px solid var(--danger); padding: 1rem; margin-bottom: 1.5rem; color: var(--danger);">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/forgot-password" class="flex flex-col gap-5">
            <div class="form-group">
                <label class="form-label text-muted">Account Username</label>
                <input name="username" placeholder="Username" required class="form-input">
            </div>

            <button type="submit" class="btn btn-primary w-full"
                style="padding: 0.8rem; font-size: 1.1rem; font-weight: 600;">
                Send Recovery Code
            </button>
        </form>

        <div class="text-center mt-6">
            <a href="/login" class="text-muted text-sm hover:text-primary transition">Return safely back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
